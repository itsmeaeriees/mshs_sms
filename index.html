<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Student Management System</title>
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
      body {
        font-family: Arial, sans-serif;
      }
    </style>
  </head>

  <body class="bg-gray-100">
    <!-- LOGIN SCREEN -->
    <div id="loginPage" class="flex items-center justify-center h-screen">
      <div class="bg-white p-8 rounded-xl shadow-lg w-96">
        <h2 class="text-2xl font-bold mb-4 text-center">
          Student System Login
        </h2>

        <input
          id="username"
          type="text"
          placeholder="Username"
          class="w-full p-2 border rounded mb-3"
        />

        <input
          id="password"
          type="password"
          placeholder="Password"
          class="w-full p-2 border rounded mb-4"
        />

        <button
          onclick="login()"
          class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700"
        >
          Login
        </button>

        <p class="text-sm text-gray-500 mt-3 text-center">
          Demo: any username/password
        </p>
      </div>
    </div>

    <!-- DASHBOARD -->
    <div id="dashboard" class="hidden flex h-screen">
      <!-- SIDEBAR -->
      <div class="w-64 bg-gray-900 text-white p-5">
        <h1 class="text-xl font-bold mb-6">🎓 StudentMS</h1>

        <ul class="space-y-3">
          <li class="hover:bg-gray-700 p-2 rounded cursor-pointer">
            Dashboard
          </li>
          <li class="hover:bg-gray-700 p-2 rounded cursor-pointer">Students</li>
          <li class="hover:bg-gray-700 p-2 rounded cursor-pointer">Settings</li>
        </ul>

        <button onclick="logout()" class="mt-10 bg-red-500 w-full p-2 rounded">
          Logout
        </button>
      </div>

      <!-- MAIN CONTENT -->
      <div class="flex-1 p-6">
        <h2 class="text-2xl font-bold mb-4">Dashboard Overview</h2>

        <!-- CARDS -->
        <div class="grid grid-cols-3 gap-4 mb-6">
          <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">Total Students</p>
            <h3 id="totalStudents" class="text-2xl font-bold">0</h3>
          </div>

          <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">Active Users</p>
            <h3 class="text-2xl font-bold">Multi-User</h3>
          </div>

          <div class="bg-white p-4 rounded shadow">
            <p class="text-gray-500">System Status</p>
            <h3 class="text-green-600 font-bold">Online</h3>
          </div>
        </div>

        <!-- ADD STUDENT -->
        <div class="bg-white p-4 rounded shadow mb-4">
          <h3 class="font-bold mb-2">Add Student</h3>

          <div class="flex gap-2">
            <input
              id="studentName"
              placeholder="Name"
              class="border p-2 rounded w-full"
            />

            <input
              id="studentCourse"
              placeholder="Course"
              class="border p-2 rounded w-full"
            />

            <button
              onclick="addStudent()"
              class="bg-green-600 text-white px-4 rounded"
            >
              Add
            </button>
          </div>
        </div>

        <!-- TABLE -->
        <div class="bg-white p-4 rounded shadow">
          <h3 class="font-bold mb-3">Student List</h3>

          <table class="w-full text-left">
            <thead>
              <tr class="border-b">
                <th class="p-2">Name</th>
                <th class="p-2">Course</th>
                <th class="p-2">Action</th>
              </tr>
            </thead>
            <tbody id="studentTable"></tbody>
          </table>
        </div>
      </div>
    </div>

    <script>
      let students = JSON.parse(localStorage.getItem("students")) || [];

      /* LOGIN */
      function login() {
        document.getElementById("loginPage").classList.add("hidden");
        document.getElementById("dashboard").classList.remove("hidden");
        renderStudents();
      }

      /* LOGOUT */
      function logout() {
        document.getElementById("dashboard").classList.add("hidden");
        document.getElementById("loginPage").classList.remove("hidden");
      }

      /* ADD STUDENT */
      function addStudent() {
        const name = document.getElementById("studentName").value;
        const course = document.getElementById("studentCourse").value;

        if (!name || !course) return alert("Please fill all fields");

        students.push({ name, course });
        localStorage.setItem("students", JSON.stringify(students));

        document.getElementById("studentName").value = "";
        document.getElementById("studentCourse").value = "";

        renderStudents();
      }

      /* DELETE STUDENT */
      function deleteStudent(index) {
        students.splice(index, 1);
        localStorage.setItem("students", JSON.stringify(students));
        renderStudents();
      }

      /* RENDER */
      function renderStudents() {
        const table = document.getElementById("studentTable");
        table.innerHTML = "";

        students.forEach((s, i) => {
          table.innerHTML += `
      <tr class="border-b">
        <td class="p-2">${s.name}</td>
        <td class="p-2">${s.course}</td>
        <td class="p-2">
          <button onclick="deleteStudent(${i})"
            class="bg-red-500 text-white px-3 py-1 rounded">
            Delete
          </button>
        </td>
      </tr>
    `;
        });

        document.getElementById("totalStudents").innerText = students.length;
      }

      /* INIT */
      renderStudents();
    </script>
  </body>
</html>
